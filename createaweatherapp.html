<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .weather-box {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
        }
        .temp {
            font-size: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card weather-box shadow-lg p-4 text-center">
    <h3 class="mb-3">🌤 Weather App</h3>

    <!-- ✅ Search -->
    <div class="input-group mb-3">
        <input type="text" id="city" class="form-control" placeholder="Enter city name">
        <button class="btn btn-primary" onclick="getWeather()">Search</button>
    </div>

    <!-- ✅ Output -->
    <div id="result" class="d-none">
        <h4 id="cityName"></h4>
        <p id="description"></p>
        <div class="temp" id="temperature"></div>
        <p>Humidity: <span id="humidity"></span>%</p>
        <p>Wind Speed: <span id="wind"></span> km/h</p>
    </div>

    <!-- ✅ Error -->
    <p class="text-danger mt-3" id="error"></p>
</div>

<!-- ✅ JavaScript (ES7) -->
<script>
    const API_KEY = "YOUR_API_KEY_HERE"; // <-- Add your API key here

    const getWeather = async () => {
        const city = document.getElementById("city").value.trim();
        const result = document.getElementById("result");
        const error = document.getElementById("error");

        if (!city) {
            error.textContent = "Please enter a city name!";
            result.classList.add("d-none");
            return;
        }

        try {
            error.textContent = "";

            const response = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
            );

            if (!response.ok) throw new Error("City not found");

            const data = await response.json();

            document.getElementById("cityName").textContent = data.name;
            document.getElementById("description").textContent =
                data.weather[0].description.toUpperCase();
            document.getElementById("temperature").textContent =
                `${Math.round(data.main.temp)}°C`;
            document.getElementById("humidity").textContent = data.main.humidity;
            document.getElementById("wind").textContent = data.wind.speed;

            result.classList.remove("d-none");

        } catch (err) {
            result.classList.add("d-none");
            error.textContent = "City not found! Try again.";
        }
    };
</script>

</body>
</html>
